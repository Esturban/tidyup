name: Publish Python 🐍 distribution 📦 to PyPI and TestPyPI

on: push

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - name: Install build deps
      run: |
        python -m pip install --upgrade pip setuptools setuptools_scm wheel build twine

    - name: Show git metadata
      run: |
        echo "git describe:"; git describe --tags --long --always || true
        echo "git head:"; git rev-parse --verify HEAD || true

    - name: Show resolved version (setuptools_scm)
      run: |
        python -c "import setuptools_scm; print('setuptools_scm', setuptools_scm.__version__)" || true
        python -c "from setuptools_scm import get_version; print('resolved version:', get_version())" || true

    - name: Compute CI-friendly version and export
      run: |
        DESC=$(git describe --tags --long --always || true)
        echo "git describe: $DESC"
        if [[ "$DESC" =~ ^v?([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)-g ]]; then
          TAG=${BASH_REMATCH[1]}
          COMMITS=${BASH_REMATCH[2]}
          if [ "$COMMITS" -eq 0 ]; then
            VER="$TAG"
          else
            VER="$TAG.dev$COMMITS"
          fi
        else
          COMMITS=$(git rev-list --count HEAD || echo 0)
          VER="0.0.0.dev$COMMITS"
        fi
        echo "Computed version: $VER"
        echo "SETUPTOOLS_SCM_PRETEND_VERSION=$VER" >> $GITHUB_ENV


    - name: Build a binary wheel and a source tarball
      env:
        SETUPTOOLS_SCM_LOCAL_SCHEME: no-local-version
        SETUPTOOLS_SCM_DEBUG: '1'
      run: python -m build --no-isolation

    - name: Show built distributions and metadata
      run: |
        ls -la dist
        for f in dist/*; do
          echo "== $f =="
          if [[ "$f" == *.whl ]]; then
            unzip -p "$f" '*/METADATA' | sed -n '1,40p'
          else
            tar -O -xzf "$f" --wildcards --no-anchored '*/PKG-INFO' | sed -n '1,40p'
          fi
        done

    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tidyup
    permissions:
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Validate distribution version
      run: |
        VERSION=''
        for f in dist/*; do
          if [[ "$f" == *.whl ]]; then
            VERSION=$(unzip -p "$f" '*/METADATA' | awk -F': ' '/^Version:/{print $2; exit}')
          else
            VERSION=$(tar -O -xzf "$f" --wildcards --no-anchored '*/PKG-INFO' | awk -F': ' '/^Version:/{print $2; exit}')
          fi
          if [ -n "$VERSION" ]; then break; fi
        done
        echo "Distribution version: $VERSION"
        if [[ "$VERSION" == *+* ]]; then
          echo "ERROR: Version contains local identifier '+' which PyPI/TestPyPI rejects: $VERSION"
          exit 1
        fi
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  github-release:
    name: >-
      Sign the Python 🐍 distribution 📦 with Sigstore
      and upload them to GitHub Release
    needs:
    - publish-to-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write 
      id-token: write 

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@v2.1.1
      with:
        inputs: >-
          ./dist/*.tar.gz
          ./dist/*.whl
    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release create
        '${{ github.ref_name }}'
        --repo '${{ github.repository }}'
        --notes ""
    - name: Upload artifact signatures to GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      # Upload to GitHub Release using the `gh` CLI.
      # `dist/` contains the built packages, and the
      # sigstore-produced signatures and certificates.
      run: >-
        gh release upload
        '${{ github.ref_name }}' dist/**
        --repo '${{ github.repository }}'

  publish-to-testpypi:
    name: Publish Python 🐍 distribution 📦 to TestPyPI
    needs:
    - build
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/tidyup

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution 📦 to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
      with:
        repository-url: https://test.pypi.org/legacy/
        verbose: true