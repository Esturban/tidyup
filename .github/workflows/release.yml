name: Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use existing tag on this commit, or generate a date-based one
          TAG=$(git tag --points-at HEAD | head -1)
          if [ -z "$TAG" ]; then
            TAG="v$(date -u +%Y.%m.%d)-$(git rev-parse --short HEAD)"
            git tag "$TAG"
            git push origin "$TAG"
          fi
          gh release create "$TAG" \
            --generate-notes \
            --title "$TAG" \
            --target "$(git rev-parse HEAD)"
